# ─────────────────────────────────────────────────────────────
# BLOOM BEAUTY PH — Business Operations (Layer 2)
# What this file is: how the business runs day-to-day.
# Hours, delivery, payments, policies, and static FAQs.
# Update when policies change — no developer needed for content.
# ─────────────────────────────────────────────────────────────

hours:
  general: "We process orders Monday–Saturday, 9am–6pm."
  cutoff: "Orders placed before 3pm are processed same day."
  sunday: "Closed on Sundays — orders received Sunday are processed Monday morning."
  holidays: "We post holiday schedules on our Facebook page."

delivery:
  available: true
  couriers:
    - J&T Express
    - LBC
  fee: 80
  free_threshold: 1000
  metro_manila_days: "1–3 business days"
  provincial_days: "3–7 business days"
  non_serviceable: "We currently don't ship outside the Philippines."
  tracking: "Once your order is shipped, we'll send your tracking number via this chat."

payment:
  methods:
    - GCash
    - Maya
    - Credit/debit card
    - COD (Metro Manila only)
  instructions:
    gcash:
      number: "0917-XXX-XXXX"
      account_name: "Bloom Beauty PH"
      instruction: "Send payment via GCash to 0917-XXX-XXXX (Bloom Beauty PH). Screenshot your receipt and send it here to confirm."
    maya:
      number: "0917-XXX-XXXX"
      account_name: "Bloom Beauty PH"
      instruction: "Pay via Maya to 0917-XXX-XXXX (Bloom Beauty PH). Send your payment screenshot here to confirm."
    card: "You'll receive a secure payment link via email after your order is confirmed."
    cod: "Cash on delivery available for Metro Manila only. Please prepare the exact amount."

policies:
  returns: "Unopened and unused items can be returned within 7 days of delivery. No returns on opened skincare or makeup for hygiene reasons."
  refunds: "Refunds are processed within 3–5 business days after the return is received and inspected."
  exchange: "We accept exchanges for the same item in a different variant (e.g. different shade) within 7 days, unopened."
  damaged_orders: "If your order arrives damaged, send us a photo within 24 hours and we'll sort it out right away."
  lost_orders: "If tracking shows delivered but you didn't receive it, message us and we'll investigate with the courier."

order_flow:
  required_fields:
    - product name and variant (if applicable)
    - quantity
    - customer full name
    - contact number
    - delivery address (barangay, city, province)
    - payment method
  collect_one_at_a_time: true
  max_quantity_per_item: 50

static_faqs:
  - q: "Do you have a physical store?"
    a: "We're online only po! But we ship nationwide via J&T and LBC."
  - q: "Is Bloom Beauty cruelty-free?"
    a: "Yes po! All Bloom Beauty products are cruelty-free and not tested on animals."
  - q: "Are your products safe for pregnant women?"
    a: "We always recommend checking with your OB first. Our Gentle Cleanser and Daily Moisturizer are generally considered safe, but avoid Vitamin C and Niacinamide serums during the first trimester to be safe."
  - q: "Do you have a loyalty program?"
    a: "Not yet, but we're working on one! Follow us on Instagram @bloombeautyph for updates."
  - q: "Can I change or cancel my order?"
    a: "You can cancel or change your order within 1 hour of placing it. After that, it may already be packed for shipping."
  - q: "How do I know which products are right for me?"
    a: "Just tell me your skin type and main concerns — dry, oily, acne, dark spots — and I'll recommend the best products for you!"
